<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1B4332">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="명랑골프">
<link rel="manifest" href="/golf-app/manifest.json">
<title>명랑골프</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,'Noto Sans KR',sans-serif;}
.wrap{
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px 24px;
  background:linear-gradient(160deg,#1B4332 0%,#2D6A4F 50%,#1B4332 100%);
}
.logo{text-align:center;margin-bottom:48px;}
.logo-icon{font-size:72px;margin-bottom:12px;}
.logo-title{font-size:32px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.logo-sub{font-size:14px;color:rgba(255,255,255,0.6);margin-top:6px;}
.game-cards{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;}
.game-card{
  background:rgba(255,255,255,0.1);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:20px;padding:24px 20px;cursor:pointer;
  text-decoration:none;display:flex;align-items:center;gap:18px;
  transition:transform 0.15s;
}
.game-card:active{transform:scale(0.97);}
.game-card.primary{background:rgba(255,255,255,0.95);border-color:rgba(255,255,255,0.95);}
.card-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.card-icon.g1{background:linear-gradient(135deg,#74C69D,#40916C);}
.card-icon.g2{background:linear-gradient(135deg,#F9C74F,#F3722C);}
.card-text{flex:1;}
.card-name{font-size:18px;font-weight:800;margin-bottom:4px;}
.card-desc{font-size:13px;line-height:1.5;}
.card-arrow{font-size:24px;flex-shrink:0;opacity:0.4;}
.game-card.primary .card-name{color:#1B4332;}
.game-card.primary .card-desc{color:#4A6741;}
.game-card.primary .card-arrow{color:#1B4332;}
.game-card:not(.primary) .card-name{color:#fff;}
.game-card:not(.primary) .card-desc{color:rgba(255,255,255,0.7);}
.game-card:not(.primary) .card-arrow{color:#fff;}
.version{margin-top:32px;font-size:11px;color:rgba(255,255,255,0.3);}
</style>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/golf-app/sw.js',{scope:'/golf-app/'});
  });
}
</script></head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">⛳</div>
    <div class="logo-title">명랑골프</div>
    <div class="logo-sub">게임을 선택하세요</div>
  </div>
  <div class="game-cards">
    <!-- 6라운드 게임 -->
    <div class="game-card primary" style="flex-direction:column;gap:10px;cursor:default;">
      <div style="display:flex;align-items:center;gap:18px;width:100%;">
        <div class="card-icon g1">🏌️</div>
        <div class="card-text">
          <div class="card-name">6라운드 게임</div>
          <div class="card-desc">18홀을 6홀씩 3라운드로<br>핸디 조정 · 버디벌금 포함</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;width:100%;">
        <a href="round6.html" style="flex:1;text-align:center;padding:10px;background:#2D6A4F;color:#fff;border-radius:10px;font-size:14px;font-weight:800;text-decoration:none;">🎮 방장</a>
        <a href="round6.html?join=1" style="flex:1;text-align:center;padding:10px;background:#1B4332;color:#9FE1CB;border-radius:10px;font-size:14px;font-weight:800;text-decoration:none;">🔑 참가</a>
      </div>
    </div>

    <!-- 스트로크 게임 -->
    <div class="game-card" style="flex-direction:column;gap:10px;cursor:default;">
      <div style="display:flex;align-items:center;gap:18px;width:100%;">
        <div class="card-icon g2">📊</div>
        <div class="card-text">
          <div class="card-name">스트로크 게임</div>
          <div class="card-desc">18홀 총 타수 합산<br>핸디캡 적용 넷스코어</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;width:100%;">
        <a href="stroke.html" style="flex:1;text-align:center;padding:10px;background:rgba(255,255,255,0.25);color:#1B4332;border-radius:10px;font-size:14px;font-weight:800;text-decoration:none;">🎮 방장</a>
        <a href="stroke.html?join=1" style="flex:1;text-align:center;padding:10px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);border-radius:10px;font-size:14px;font-weight:800;text-decoration:none;">🔑 참가</a>
      </div>
    </div>

    <!-- 스코어카드 -->
    <div class="game-card" style="flex-direction:column;gap:10px;cursor:default;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);">
      <div style="display:flex;align-items:center;gap:18px;width:100%;">
        <div class="card-icon" style="background:linear-gradient(135deg,#1A5C8A,#2D8FC0);">📋</div>
        <div class="card-text">
          <div class="card-name" style="color:#fff;">스코어카드</div>
          <div class="card-desc" style="color:rgba(255,255,255,0.7);">전반/후반 9홀 스코어 기록<br>핸디캡 · 넷스코어 자동 계산</div>
        </div>
      </div>
      <a href="scorecard.html" style="width:100%;text-align:center;padding:10px;background:rgba(45,143,192,0.4);color:#fff;border-radius:10px;font-size:14px;font-weight:800;text-decoration:none;">📋 스코어 기록하기</a>
    </div>

  </div>
  <div class="version">명랑골프 v2.0</div>
</div>
</body>
</html>
