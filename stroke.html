<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A3A5C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>스트로크 게임</title>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --blue:#1A3A5C;--blue2:#2563A8;--blue3:#3B82D4;
  --bg:#F0F4F8;--card:#fff;--border:#D1DCE8;
  --t1:#0F1F30;--t2:#4A6080;--t3:#8AA0B8;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:-apple-system,'Noto Sans KR',sans-serif;color:var(--t1);overflow:hidden;}
.app{display:flex;flex-direction:column;position:fixed;inset:0;}
.topbar{background:var(--blue);color:#fff;padding:calc(var(--safe-top)+8px) 12px 8px;display:flex;flex-direction:column;flex-shrink:0;}
.r1{display:flex;align-items:center;justify-content:space-between;}
.r2{display:flex;align-items:center;justify-content:space-between;margin-top:3px;}
.tabs{background:var(--card);border-bottom:2px solid var(--border);display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:9px 10px;font-size:12px;font-weight:500;color:var(--t3);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.foot{background:var(--card);border-top:1px solid var(--border);padding:10px 12px calc(var(--safe-bot)+10px);flex-shrink:0;display:flex;gap:7px;}
.btn{flex:1;padding:13px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;}
.btn:active{transform:scale(0.97);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-nv{background:#1A5C99;color:#fff;}
.btn-lt{background:#EEF2F7;color:var(--t1);}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.ch{padding:11px 14px;background:#EFF6FF;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--blue);display:flex;align-items:center;justify-content:space-between;}
.fr{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.fr:last-child{border-bottom:none;}
.fl{font-size:13px;color:var(--t2);font-weight:500;min-width:72px;}
.fi{flex:1;height:38px;padding:0 10px;font-size:14px;font-weight:600;border:1.5px solid var(--border);border-radius:8px;background:#fafcfa;color:var(--t1);}
.fi:focus{outline:none;border-color:var(--blue3);}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
/* 스코어 박스 */
.sbox{width:52px;height:46px;border-radius:8px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;cursor:pointer;margin:0 auto;user-select:none;}
.sbox:active{transform:scale(0.93);}
.sbox.birdie{background:#D4F5E5;color:#0A6B42;border-color:#0F9E6A;border-width:2.5px;animation:glow 1.2s ease-in-out infinite;}
@keyframes glow{0%{box-shadow:0 0 4px rgba(15,158,106,0.4);}50%{box-shadow:0 0 14px 5px rgba(15,158,106,0.85);}100%{box-shadow:0 0 4px rgba(15,158,106,0.4);}}
.sbox.baeban-score{border-color:#FF6B00;border-width:2px;}
/* 팝업 */
.pop-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;}
.pop-ov.open{display:flex;}
.pop{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:0 0 calc(var(--safe-bot)+12px);animation:sup 0.2s;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pop-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sopts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px;}
.sopt{padding:12px 4px;border-radius:10px;text-align:center;cursor:pointer;border:1.5px solid transparent;}
.sopt:active{transform:scale(0.95);}
.sopt .ol{font-size:11px;font-weight:600;opacity:0.8;margin-bottom:4px;}
.sopt .ov{font-size:20px;font-weight:900;}
.sopt.birdie-opt{background:linear-gradient(145deg,#11C26E,#0F9E6A)!important;}
.sopt.birdie-opt .ol,.sopt.birdie-opt .ov{color:#fff!important;opacity:1!important;}
/* 모달 */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;}
.mo.on{display:flex;}
.ms{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 0 calc(var(--safe-bot)+14px);animation:sup 0.2s;}
.mh{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 14px;}
.mt2{font-size:16px;font-weight:700;padding:0 16px 12px;border-bottom:1px solid var(--border);color:var(--blue);}
.mbt{display:flex;gap:8px;padding:14px 16px 0;}
.mb{flex:1;padding:13px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.mb-c{background:#EEF2F7;color:#666;}.mb-s{background:var(--blue);color:#fff;}
/* 토스트 */
#_t{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(26,58,92,0.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:999;transition:opacity 0.4s;pointer-events:none;white-space:nowrap;opacity:0;}
/* 버디 축하 */
.birdie-ov{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;pointer-events:none;background:rgba(0,0,0,0.15);}
.birdie-ov.show{display:flex;}
.birdie-bang{text-align:center;animation:bpop 2s ease forwards;}
@keyframes bpop{0%{transform:scale(0.2)rotate(-15deg);opacity:0;}25%{transform:scale(1.4)rotate(6deg);opacity:1;}75%{opacity:1;}100%{transform:scale(0.7);opacity:0;}}
.birdie-txt{font-size:52px;font-weight:900;background:linear-gradient(135deg,#FFD700,#FF6B35,#FF1493);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}
.particle{position:fixed;pointer-events:none;z-index:499;border-radius:50%;animation:fall 1.6s ease-in forwards;}
@keyframes fall{0%{opacity:1;}100%{transform:translateY(70vh)rotate(720deg);opacity:0;}}

/* 사진 섹션 */
.photo-section{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px;}
.photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.photo-item{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.photo-item img{width:100%;height:100%;object-fit:cover;}
.photo-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.photo-add{width:80px;height:80px;border-radius:8px;border:2px dashed #ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#f9f9f9;flex-shrink:0;gap:2px;}
.photo-add span{font-size:22px;}
.photo-add small{font-size:10px;color:#aaa;font-weight:600;}
</style>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/golf-app/sw.js',{scope:'/golf-app/'});
  });
}
</script></head>

  </div>

  <div id="roomStatus" style="margin-top:16px;font-size:13px;color:rgba(255,255,255,0.6);text-align:center;"></div>

  <div style="margin-top:20px;width:100%;max-width:320px;background:rgba(255,200,0,0.12);border:1px solid rgba(255,200,0,0.3);border-radius:12px;padding:14px 16px;">
    <div style="font-size:12px;font-weight:800;color:#FFD700;margin-bottom:8px;">⚠️ 카카오톡에서 열었나요?</div>

<!-- 방 코드 배지 (게임 중 표시) -->
<div id="roomBadge" style="display:none;position:fixed;top:0;left:0;right:0;z-index:50;background:#0F2030;padding:4px 12px;display:none;align-items:center;justify-content:space-between;">

<div id="_t"></div>

<script>
// ── Firebase 초기화 ──
const firebaseConfig = {
  databaseURL: "https://myeongnang-golf-adcb8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "myeongnang-golf-adcb8",
};
const _fbApp=firebase.apps.find(a=>a.name==='stroke')||firebase.initializeApp(firebaseConfig,'stroke');
const db=_fbApp.database();

var currentRoom=null, isHost=false, dbRef=null, _isSyncing=false;

function genRoomCode(){
  return String(Math.floor(Math.random()*900)+100); // 100~999 3자리 숫자
}

function createRoom(){
  const code=genRoomCode();
  currentRoom=code; isHost=true;
  // 새 게임 - 이름/핸디/스코어 초기화
  G.players=[
    {name:'플레이어1',handi:0},
    {name:'플레이어2',handi:0},
    {name:'플레이어3',handi:0},
    {name:'플레이어4',handi:0},
  ];
  G.scores=Array.from({length:4},()=>Array(18).fill(null));
  G.history=[];
  G.gameDate=new Date().toISOString().slice(0,10);
  localStorage.setItem('stroke_room',code); // 방코드 저장
  document.getElementById('roomStatus').textContent='방 만드는 중...';
  dbRef=db.ref('rooms/'+code);
  dbRef.set({created:Date.now(),game:JSON.stringify(G)}).then(()=>{
    enterGame(code); startSync();
  }).catch(e=>{document.getElementById('roomStatus').textContent='❌ 오류: '+e.message;});
}

function joinRoom(){
  const code=document.getElementById('roomCodeInput').value.trim();
  if(code.length!==3){alert('방 코드 3자리를 입력하세요');return;}
  autoJoin(code);
}

function autoJoin(code){
  document.getElementById('roomStatus').textContent='접속 중...';
  dbRef=db.ref('rooms/'+code);
  dbRef.once('value').then(snap=>{
    if(!snap.exists()){
      document.getElementById('roomStatus').textContent='❌ 방을 찾을 수 없어요';
      localStorage.removeItem('stroke_room'); // 방 없으면 저장된 코드 삭제
      return;
    }
    currentRoom=code; isHost=false;
    localStorage.setItem('stroke_room',code); // 방코드 저장
    const data=snap.val();
    if(data.game){_isSyncing=true;Object.assign(G,JSON.parse(data.game));_isSyncing=false;}
    enterGame(code); startSync();
  }).catch(e=>{document.getElementById('roomStatus').textContent='❌ 오류: '+e.message;});
}

function enterGame(code){
  document.getElementById('roomScreen').style.display='none';
  const badge=document.getElementById('roomBadge');
  badge.style.display='flex';
  document.getElementById('roomCodeDisplay').textContent=code;
  document.querySelector('.topbar').style.paddingTop='calc(env(safe-area-inset-top,0px) + 28px)';
  // 저장된 게임 있으면 마지막 탭으로, 없으면 setup으로
  const hasData=G.scores&&G.scores.some(r=>r.some(v=>v!==null));
  ST(hasData ? (G.curTab||'setup') : 'setup');
}

function startSync(){
  if(!dbRef) return;
  dbRef.child('game').on('value',snap=>{
    if(!snap.exists()||_isSyncing) return;
    _isSyncing=true;

// ── 배판 판정 ──
function isBaeban(hIdx){
  if(!G.baeban) return false;
  const par=G.pars[hIdx];
  const n=G.players.length;
  const vals=G.players.map((_,pi)=>G.scores[pi][hIdx]).filter(v=>v!==null);
  if(vals.length!==n) return false;
  // 전원 동타 → 비김 (배판 아님)
  if(vals.every(v=>v===vals[0])) return false;
  // 버디 이하
  if(vals.some(v=>v<=-1)) return true;
  // 파에 따른 기준
  const limit=par===3?2:3;
  if(vals.some(v=>v>=limit)) return true;
  // 동타 배판: n명 중 과반수 동타 (전원 제외)
  // 4~5명: 3명 이상 동타 / 3명: 2명 동타
  const minTie=n<=3?2:3;
  const scoreCount={};
  vals.forEach(v=>{scoreCount[v]=(scoreCount[v]||0)+1;});
  const maxTie=Math.max(...Object.values(scoreCount));
  if(maxTie>=minTie && maxTie<n) return true;
  return false;
}

// ── 홀별 정산 ──
// 모든 쌍 1:1: 타수차이 + 버디보너스(버디한 쪽에 +1타 추가)
function calcHole(hIdx){
  const n=G.players.length;
  const bb=isBaeban(hIdx);
  const mult=bb?2:1;
  const settle=Array(n).fill(0);
  let allFilled=G.players.every((_,pi)=>G.scores[pi][hIdx]!==null);
  if(!allFilled) return{settle,baeban:bb,allFilled:false};

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const si=G.scores[i][hIdx];
      const sj=G.scores[j][hIdx];
      let diff=si-sj; // 양수면 i가 많이침 → i가 j에게 줌
      // 버디 보너스: 버디(-1이하)한 쪽에 +1타 추가
      if(si<=-1&&sj>si) diff-=1; // i가 버디 → i에게 유리하게 1타 더
      if(sj<=-1&&si>sj) diff+=1; // j가 버디 → j에게 유리하게 1타 더
      const amt=Math.abs(diff)*G.unitPrice*mult;
      if(diff>0){settle[i]-=amt;settle[j]+=amt;}
      else if(diff<0){settle[i]+=amt;settle[j]-=amt;}
    }
  }
  return{settle,baeban:bb,allFilled:true};
}

// ── 선수금 계산 ──
// 핸디 낮은 고수 → 핸디 높은 하수에게 지급
function calcHandiMoney(){
  const n=G.players.length;
  const mult=G.baeban?1.5:1;
  const settle=Array(n).fill(0);
  const pairs=[];
  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const hi=G.players[i].handi;
      const hj=G.players[j].handi;
      const diff=hj-hi; // 양수면 j가 하수(핸디높음) → i(고수)가 j(하수)에게 지급
      if(diff===0) continue;
      const amt=Math.abs(diff)*G.unitPrice*mult;
      pairs.push({pi1:i,pi2:j,diff,amount:amt});
      if(diff>0){
        // j가 하수 → i(고수)가 j(하수)에게 줌
        settle[i]-=amt; settle[j]+=amt;
      } else {
        // i가 하수 → j(고수)가 i(하수)에게 줌
        settle[j]-=amt; settle[i]+=amt;
      }
    }
  }
  return{pairs,settle};
}

// ── 총 수지 ──
function calcTotal(){
  const n=G.players.length;
  const bal=Array(n).fill(0);
  // 선수금
  calcHandiMoney().settle.forEach((v,i)=>bal[i]+=v);
  // 홀별
  for(let h=0;h<18;h++){
    const {settle}=calcHole(h);
    settle.forEach((v,i)=>bal[i]+=v);
  }
  return bal;
}

  {val:-2,label:'🦅 이글',bg:'#FAC775',color:'#412402'},
  {val:-1,label:'🐦 버디',bg:'#11C26E',color:'#fff',birdie:true},
  {val:0, label:'파',bg:'#F0F0EE',color:'#444'},
  {val:1, label:'보기',bg:'#F5C4B3',color:'#4A1B0C'},
  {val:2, label:'더블',bg:'#F7C1C1',color:'#501313'},
  {val:3, label:'트리플',bg:'#E24B4A',color:'#fff'},
  {val:4, label:'4오버',bg:'#C0392B',color:'#fff'},
  {val:null,label:'취소',bg:'#F5F5F0',color:'#999'},
];
function openPop(pi,h){
  _popPi=pi;_popH=h;
  const hn=holeNum(h);const par=G.pars[h];
  document.getElementById('popTitle').textContent=hn+'홀 (Par'+par+') · '+G.players[pi].name;
  const cur=G.scores[pi][h];
  document.getElementById('scoreOpts').innerHTML=SCORE_OPTS.map(o=>{
    const sel=(o.val===cur)||(o.val===null&&cur===null);
    return'<div class="sopt'+(o.birdie?' birdie-opt':'')+(sel?' selected':'')+'" style="background:'+o.bg+'" onclick="setScore('+o.val+')">'
      +'<div class="ol" style="color:'+o.color+'">'+o.label+'</div>'
      +'<div class="ov" style="color:'+o.color+'">'+(o.val===null?'−':o.val===0?'0':o.val)+'</div></div>';
  }).join('');
  document.getElementById('scorePop').className='pop-ov open';
}
function closePop(){document.getElementById('scorePop').className='pop-ov';_popPi=null;_popH=null;}
function setScore(val){
  if(_popPi===null) return;
  pushHistory();
  G.scores[_popPi][_popH]=(val===null||val==='null')?null:val;
  SV(); closePop();
  syncToFirebase(); // 🔥 실시간 동기화
  if(val!==null&&val<=-1) showBirdie(val);
  ST(G.curTab);
}
function showBirdie(v){
  const o=document.getElementById('birdieOv');
  const t=document.getElementById('birdieTxt');
  t.textContent=v<=-3?'ALBATROSS!':v===-2?'EAGLE!':'BIRDIE!';
  if(navigator.vibrate)navigator.vibrate([80,40,80,40,150]);
  o.className='birdie-ov show';
  // 파티클
  const colors=['#FFD700','#FF6B35','#FF1493','#9B59B6','#3498DB','#2ECC71'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText='background:'+colors[i%colors.length]+';width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;left:'+Math.random()*100+'vw;top:'+Math.random()*30+'vh;animation-duration:'+(1+Math.random()*0.8)+'s;animation-delay:'+(Math.random()*0.4)+'s;';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2400);
  }
  setTimeout(()=>{o.className='birdie-ov';},2000);
}

// ── 결과 화면 ──
function RResult(){
  const bal=calcTotal();
  const {settle:handiSettle}=calcHandiMoney();

  // 각 플레이어 총 오버타수
  const totalOver=G.players.map((_,pi)=>{
    let tot=0,cnt=0;
    for(let h=0;h<18;h++){if(G.scores[pi][h]!==null){tot+=G.scores[pi][h];cnt++;}}
    return cnt>0?tot:null;
  });

  const sorted=[...G.players.map((p,i)=>({...p,i,bal:bal[i],over:totalOver[i]}))].sort((a,b)=>b.bal-a.bal);
  const MEDALS=['🥇','🥈','🥉','④','⑤'];

  // ── 최종 수지 2x2 카드 ──
  let h='<div style="background:linear-gradient(135deg,#1A3A5C,#2563A8);border-radius:14px;padding:14px;margin-bottom:10px;">'
    +'<div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:10px;">💰 최종 수지 결과</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';

  sorted.forEach((p,ri)=>{
    const col=p.bal>0?'#9FE1CB':p.bal<0?'#FAC775':'#fff';
    h+='<div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:10px 8px;text-align:center;">'
      +'<div style="font-size:22px;margin-bottom:3px;">'+MEDALS[ri]+'</div>'
      +'<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;">'+p.name+'</div>'
      +'<div style="font-size:11px;color:rgba(255,255,255,0.55);margin-bottom:4px;">'
        +'H'+p.handi+(p.over!==null?' · 오버'+( p.over>0?'+':'')+p.over:'')
      +'</div>'
      +'<div style="font-size:15px;font-weight:800;color:'+col+';">'
        +(p.bal===0?'±0':p.bal>0?'+Rp'+p.bal.toLocaleString():'-Rp'+(-p.bal).toLocaleString())
      +'</div>'
      +'</div>';
  });
  h+='</div></div>';

  // ── 성적 요약 카드 ──
  h+='<div class="card"><div class="ch">📊 성적 요약</div>'
    +'<div style="overflow-x:auto;">'
    +'<table style="border-collapse:collapse;width:100%;font-size:12px;">'
    +'<tr style="background:var(--blue);color:#fff;">'
    +'<th style="padding:7px 6px;text-align:left;">이름</th>'
    +'<th style="padding:7px 4px;text-align:center;">핸디</th>'
    +'<th style="padding:7px 4px;text-align:center;">오버</th>'
    +'<th style="padding:7px 4px;text-align:center;">선수금</th>'
    +'<th style="padding:7px 4px;text-align:center;">홀정산</th>'
    +'<th style="padding:7px 4px;text-align:center;">최종</th>'
    +'</tr>';

  // 최종금액 기준 정렬
  let holeOnlyTotal=Array(G.players.length).fill(0);
  for(let i=0;i<18;i++){
    const {settle,allFilled}=calcHole(i);
    if(allFilled) settle.forEach((v,pi)=>{holeOnlyTotal[pi]+=v;});
  }

  sorted.forEach(p=>{
    const pi=p.i;
    const hc=handiSettle[pi];
    const ht=holeOnlyTotal[pi];
    const ft=bal[pi];
    const hcCol=hc>0?'#0F6E56':hc<0?'#CC0000':'#999';
    const htCol=ht>0?'#0F6E56':ht<0?'#CC0000':'#999';
    const ftCol=ft>0?'#0F6E56':ft<0?'#CC0000':'#999';
    h+='<tr style="border-bottom:1px solid var(--border);">'
      +'<td style="padding:8px 6px;font-weight:700;">'+p.name+'</td>'
      +'<td style="padding:8px 4px;text-align:center;">'+p.handi+'</td>'
      +'<td style="padding:8px 4px;text-align:center;">'+(p.over!==null?(p.over>0?'+':'')+p.over:'-')+'</td>'
      +'<td style="padding:8px 4px;text-align:center;font-weight:600;color:'+hcCol+';">'+(hc===0?'±0':hc>0?'+Rp'+( hc/1000)+'k':'-Rp'+(-hc/1000)+'k')+'</td>'
      +'<td style="padding:8px 4px;text-align:center;font-weight:600;color:'+htCol+';">'+(ht===0?'±0':ht>0?'+Rp'+(ht/1000)+'k':'-Rp'+(-ht/1000)+'k')+'</td>'

    +'<table style="border-collapse:collapse;width:100%;font-size:12px;">'
    +'<tr style="background:var(--blue);color:#fff;">'
    +'<th style="padding:7px 6px;text-align:left;width:44px;">홀</th>'
    +G.players.map(p=>'<th style="padding:7px 4px;text-align:center;">'+ini(p.name)+'</th>').join('')
    +'</tr>';

  let holeTotal=Array(G.players.length).fill(0);
  for(let i=0;i<18;i++){

    const rowBg=baeban?'#FFF0E0':i%2===0?'#fff':'#FAFAFA';

        holeTotal[pi]+=v;
        const col=v>0?'#0F6E56':v<0?'#CC0000':'#999';
        const tStr=v===0?'-':(v>0?'+':'')+Math.round(v/G.unitPrice)+'타';
        return'<td style="padding:6px 4px;text-align:center;font-weight:700;color:'+col+';">'+tStr+'</td>';
      }).join('')+'</tr>';

    +'<td style="padding:7px 6px;font-weight:800;color:#fff;font-size:11px;">합계</td>'

  h+='<div class="card"><div class="ch">⛳ 홀별 스코어카드</div>'
    +'<div style="overflow-x:auto;">'
    +'<table style="border-collapse:collapse;width:100%;font-size:12px;">'
    +'<tr style="background:var(--blue);color:#fff;">'
    +'<th style="padding:7px 6px;text-align:left;width:44px;">홀</th>'
    +'<th style="padding:7px 4px;text-align:center;color:rgba(255,255,255,0.7);">파</th>'
    +G.players.map((p,i)=>'<th style="padding:7px 4px;text-align:center;">'+ini(p.name)+'<br><span style="font-size:10px;font-weight:400;opacity:0.7;">H'+p.handi+'</span></th>').join('')
    +'</tr>';

  for(let i=0;i<18;i++){
    const hn=holeNum(i);
    const par=G.pars[i];
    const bb=isBaeban(i);
    const rowBg=bb?'#FFF0E0':i%2===0?'#fff':'#FAFAFA';
    const anyScore=G.players.some((_,pi)=>G.scores[pi][i]!==null);
    if(!anyScore) continue;
    h+='<tr style="background:'+rowBg+';">'
      +'<td style="padding:6px 6px;font-weight:700;font-size:11px;">'+hn+(bb?'🔥':'')+'</td>'
      +'<td style="padding:6px 4px;text-align:center;color:#999;font-size:11px;">P'+par+'</td>'
      +G.players.map((_,pi)=>{
        const v=G.scores[pi][i];
        if(v===null) return'<td style="padding:6px 4px;text-align:center;color:#ccc;">-</td>';
        const bg=v<=-1?'#D4F5E5':v===0?'#fff':v===1?'#FFF0E8':v===2?'#FFE0E0':'#FFCCCC';
        const col=v<=-1?'#0A6B42':v===0?'#333':v===1?'#CC5500':v===2?'#CC0000':'#990000';
        return'<td style="padding:4px 2px;text-align:center;">'
          +'<div style="background:'+bg+';border-radius:6px;padding:4px 2px;font-weight:800;font-size:14px;color:'+col+';">'
          +v+'</div>'
          +'</td>';
      }).join('')+'</tr>';
  }

  // 합계행
  h+='<tr style="background:#EFF6FF;">'
    +'<td style="padding:7px 6px;font-weight:800;color:var(--blue);font-size:11px;">합계</td>'
    +'<td style="padding:7px 4px;text-align:center;font-size:11px;color:#999;">'+G.pars.reduce((a,b)=>a+b,0)+'</td>'
    +G.players.map((_,pi)=>{
      let tot=0,cnt=0;
      for(let h2=0;h2<18;h2++){if(G.scores[pi][h2]!==null){tot+=G.scores[pi][h2];cnt++;}}
      const col=tot>0?'#CC0000':tot<0?'#0F6E56':'#333';
      return'<td style="padding:7px 4px;text-align:center;font-weight:800;color:'+col+';">'+(cnt>0?(tot>0?'+':'')+tot:'-')+'</td>';
    }).join('')+'</tr>';

  // 넷스코어행
  h+='<tr style="background:#1A3A5C;">'
    +'<td style="padding:7px 6px;font-weight:800;color:#fff;font-size:11px;">넷</td>'
    +'<td style="padding:7px 4px;text-align:center;font-size:11px;color:rgba(255,255,255,0.5);">-</td>'
    +G.players.map((p,pi)=>{
      let tot=0,cnt=0;

      const net=cnt>0?tot-p.handi:null;
      const col=net===null?'#999':net<0?'#9FE1CB':net>0?'#FAC775':'#fff';
      return'<td style="padding:7px 4px;text-align:center;font-weight:800;color:'+col+';">'+(net!==null?(net>0?'+':'')+net:'-')+'</td>';
    }).join('')+'</tr>';

  h+='</table></div></div>';

  // 사진 섹션
  h+=`<div class="photo-section">
    <div style="font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">

  </div>`;

  return h;
}

function CMo(){document.getElementById('settingMo').className='mo';}
function ApplySettings(){
  const n=parseInt(document.getElementById('s_count').value)||4;
  G.gameDate=document.getElementById('s_date').value||'';
  G.startHole=Math.max(1,Math.min(18,parseInt(document.getElementById('s_start').value)||1));
  G.unitPrice=GR('s_unit')||50000;
  G.baeban=document.getElementById('s_baeban').checked;
  G.players=Array.from({length:n},(_,i)=>({
    name:(document.getElementById('pn_'+i)||{value:'플레이어'+(i+1)}).value.trim()||'플레이어'+(i+1),
    handi:parseInt((document.getElementById('ph_'+i)||{value:'0'}).value)||0
  }));
  G.scores=Array.from({length:n},()=>Array(18).fill(null));
  G.history=[];
  CMo();SV();syncToFirebase();ST('handi');toast('✅ 설정 완료! 선수금을 확인하세요');
}

// ── 저장 ──
function doSave(){
  try{
    const now=new Date();
    const dateStr=G.gameDate||now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0');
    const names=G.players.map(p=>p.name).join('·');
    const fileName='스트로크_'+dateStr+'_'+names+'.json';
    const data=JSON.stringify({type:'stroke',...G},null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=fileName;
    a.click();URL.revokeObjectURL(url);
    toast('💾 저장: '+fileName);
  }catch(e){alert('저장 실패:'+e.message);}
}

// ── 불러오기 ──
function doLoad(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const s=JSON.parse(ev.target.result);
        if(!s.players||!s.scores){toast('❌ 올바른 파일이 아니에요');return;}
        const ok=confirm('"'+(s.players.map(p=>p.name).join('·'))+'" 게임을 불러올까요?\n현재 게임이 사라져요.');
        if(!ok) return;
        Object.assign(G,s);
        SV();ST('result');toast('📂 불러왔어요!');
      }catch(err){alert('파일 오류: '+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── 종료 ──
function doEnd(){
  const ok=confirm('게임을 종료할까요?\n저장하지 않은 데이터는 사라져요.');
  if(!ok) return;
  G.scores=Array.from({length:G.players.length},()=>Array(18).fill(null));
  G.history=[];
  SV();ST('setup');toast('게임이 초기화됐어요');
}

// ── 홈으로 (저장 확인) ──
function goHome(){
  if(G.scores.some(r=>r.some(v=>v!==null))){
    const choice=confirm('저장하고 나가시겠어요?\n\n확인 = 저장 후 나가기\n취소 = 그냥 나가기');
    if(choice===true){doSave();setTimeout(()=>{location.href='index.html';},800);}
    else if(choice===false){location.href='index.html';}
  } else {
    location.href='index.html';
  }
}

// ── 화면 벗어날 때 자동저장 (뒤로가기 포함) ──
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden') doSave();
});
window.addEventListener('pagehide',function(){ doSave(); });


// ── 사진 기능 (스트로크) ──
function getStPhotoKey(){
  const d=G.gameDate||new Date().toISOString().slice(0,10);
  const n=G.players.map(p=>p.name).join('');
  return 'st_photos_'+d+'_'+n;
}
function loadStPhotos(){try{const s=localStorage.getItem(getStPhotoKey());return s?JSON.parse(s):[]}catch(e){return[];}}
function saveStPhotos(p){try{localStorage.setItem(getStPhotoKey(),JSON.stringify(p));}catch(e){toast('⚠️ 저장공간 부족');}}

function renderStPhotos(){
  const grid=document.getElementById('stPhotoGrid');
  if(!grid)return;
  const photos=loadStPhotos();
  const cnt=document.getElementById('stPhotoCount');
  if(cnt)cnt.textContent=photos.length?photos.length+'장':'';
  let h='';
  photos.forEach((src,i)=>{
    h+=`<div class="photo-item"><img src="${src}" onclick="viewStPhoto('${src}')"><button class="photo-del" onclick="delStPhoto(${i})">✕</button></div>`;
  });
  h+=`<div class="photo-add" onclick="document.getElementById('stPhotoCam').click()" style="background:#e8f5e9;border-color:#74C69D;"><span>📸</span><small style="color:#2D6A4F;">촬영</small></div>`;
  h+=`<div class="photo-add" onclick="document.getElementById('stPhotoGallery').click()"><span>🖼️</span><small>갤러리</small></div>`;
  grid.innerHTML=h;
}
function handleStPhoto(e){
  const files=Array.from(e.target.files);
  const photos=loadStPhotos();
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const max=800;let w=img.width,hh=img.height;
        if(w>max){hh=hh*(max/w);w=max;}
        if(hh>max){w=w*(max/hh);hh=max;}
        canvas.width=w;canvas.height=hh;
        canvas.getContext('2d').drawImage(img,0,0,w,hh);
        photos.push(canvas.toDataURL('image/jpeg',0.7));
        loaded++;
        if(loaded===files.length){saveStPhotos(photos);renderStPhotos();}
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}
function delStPhoto(idx){
  if(!confirm('사진을 삭제할까요?'))return;
  const p=loadStPhotos();p.splice(idx,1);saveStPhotos(p);renderStPhotos();
}
function viewStPhoto(src){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML=`<img src="${src}" style="max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain;">`;
  ov.onclick=()=>document.body.removeChild(ov);
  document.body.appendChild(ov);
}

(function(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('join')==='1'){
    const hs=document.getElementById('hostSection');
    if(hs) hs.style.display='none';
  }
  // 저장된 방코드 있으면 이어하기 버튼 표시
  const savedRoom=localStorage.getItem('stroke_room');
  if(savedRoom){
    document.getElementById('resumeSection').style.display='block';
    document.getElementById('resumeRoomCode').textContent=savedRoom;
    document.getElementById('newGameSection').style.display='none';
  }
})();

function resumeRoom(){
  const code=localStorage.getItem('stroke_room');
  if(code) autoJoin(code);
}
function clearResume(){
  localStorage.removeItem('stroke_room');
  document.getElementById('resumeSection').style.display='none';
  document.getElementById('newGameSection').style.display='block';
}
